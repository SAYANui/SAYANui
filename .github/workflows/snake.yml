name: generate animation

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours for faster updates
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generates the snake (Optimized for speed)
      - name: generate-snake-game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#161b22,#4a2e5d,#7a3e9d,#bc50d3,#ff00ff

      # Pushes the snake to the 'output' branch
      - name: push-to-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
