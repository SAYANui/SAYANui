name: generate animation

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generates the snake
      - name: generate-snake-game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light Mode: Neon Cyan Glow on white
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#00FFFF&color_dots=#ebedf0,#004d4d,#008080,#00cccc,#00ffff
            
            # Dark Mode: Neon Cyan Glow on Deep Charcoal
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00FFFF&color_dots=#161b22,#004d4d,#008080,#00cccc,#00ffff

      # Pushes the snake to the 'output' branch
      - name: push-to-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
